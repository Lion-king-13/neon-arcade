<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON ARCADE — Meta Quest 3</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0b0e14">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<style>
  :root{
    --ink:#0b0e14; --panel:#131826; --steel:#8b93a7;
    --coral:#ff4d5e; --cyan:#2ee6d6; --lime:#b8f34d; --gold:#ffd54a;
    --violet:#8b6cff; --white:#f4f6fb;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--ink);color:var(--white);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden}
  canvas{display:block;position:fixed;inset:0}
  #overlay{
    position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at 50% 120%, rgba(18,45,42,.55) 0%, rgba(11,14,20,.9) 62%);
    z-index:10;text-align:center;padding:22px;transition:opacity .5s;
  }
  #overlay.hidden{opacity:0;pointer-events:none}
  .kicker{color:var(--lime);letter-spacing:.34em;text-transform:uppercase;font-size:.74rem;font-weight:800;margin-bottom:10px}
  h1{
    font-size:clamp(2.6rem,8vw,5.4rem);font-weight:900;letter-spacing:.05em;line-height:.9;
    background:linear-gradient(92deg,var(--lime) 0%,var(--cyan) 52%,var(--violet) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;text-transform:uppercase;
  }
  .tag{color:var(--steel);margin:14px 0 24px;font-size:.98rem;letter-spacing:.08em;text-transform:uppercase;max-width:34ch}
  .row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
  .seg{display:inline-flex;background:var(--panel);border:1px solid #232a3d;border-radius:999px;padding:4px;gap:2px}
  .seg button{
    font:inherit;font-weight:700;font-size:.84rem;color:var(--steel);background:transparent;border:none;
    padding:9px 15px;border-radius:999px;cursor:pointer;letter-spacing:.03em;transition:.18s;
  }
  .seg button.on{background:var(--cyan);color:var(--ink)}
  .seg button:disabled{cursor:default}
  .seg button:focus-visible{outline:2px solid var(--lime);outline-offset:2px}
  .lbl{display:block;color:var(--steel);font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;margin:0 0 6px}
  #vrbtn{
    font:inherit;font-weight:800;font-size:1.1rem;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink);background:var(--lime);border:none;border-radius:999px;
    padding:17px 42px;cursor:pointer;margin-top:12px;box-shadow:0 0 34px rgba(184,243,77,.4);transition:.2s;
  }
  #vrbtn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 0 46px rgba(184,243,77,.6)}
  #vrbtn:disabled{background:#2a3145;color:var(--steel);box-shadow:none;cursor:default}
  #vrbtn:focus-visible{outline:3px solid var(--cyan);outline-offset:3px}
  #status{margin-top:16px;color:var(--steel);font-size:.8rem;min-height:1.2em;max-width:44ch}
  .how{margin-top:16px;color:var(--steel);font-size:.78rem;line-height:1.7;max-width:34ch}
  .how b{color:var(--white)}
  #lang{position:fixed;top:16px;right:18px;z-index:11;color:var(--steel);font-size:.82rem;font-weight:700}
  #lang a{color:var(--steel);cursor:pointer;padding:0 4px}
  #lang a.on{color:var(--cyan)}
</style>
</head>
<body>
<div id="lang"></div>
<div id="overlay">
  <div class="kicker" id="kicker">Meta Quest 3</div>
  <h1>NEON ARCADE</h1>
  <p class="tag" id="tag"></p>

  <div class="row">
    <div>
      <span class="lbl" id="lblMode"></span>
      <div class="seg" id="mode">
        <button data-v="vr" class="on"></button>
        <button data-v="ar"></button>
      </div>
    </div>
    <div>
      <span class="lbl" id="lblDiff"></span>
      <div class="seg" id="diff">
        <button data-v="easy"></button>
        <button data-v="normal" class="on"></button>
        <button data-v="hard"></button>
      </div>
    </div>
    <div>
      <span class="lbl" id="lblTime"></span>
      <div class="seg" id="dur">
        <button data-v="60" class="on">60s</button>
        <button data-v="90">90s</button>
        <button data-v="120">120s</button>
      </div>
    </div>
    <div>
      <span class="lbl" id="lblDecor"></span>
      <div class="seg" id="decor">
        <button data-v="auto" class="on"></button>
        <button data-v="forest"></button>
        <button data-v="meadow"></button>
        <button data-v="carnival"></button>
      </div>
    </div>
  </div>

  <button id="vrbtn" disabled></button>
  <div class="how" id="how"></div>
  <div id="status"></div>
</div>

<script type="module">
import { Engine } from './engine.js';
import { Hub } from './hub.js';
import whackamole from './games/whackamole.js';
import butterflies from './games/butterflies.js';
import ducks from './games/ducks.js';
import shooting from './games/shooting.js';
import balloons from './games/balloons.js';
import chamboultout from './games/chamboultout.js';
import reflexpads, { chaos as reflexchaos } from './games/reflexpads.js';
import fishing from './games/fishing.js';
import ringtoss from './games/ringtoss.js';
import skeet from './games/skeet.js';

const T = {
  fr:{
    tag:"Une arcade de mini-jeux à jouer debout, tout le corps engagé.",
    mode:"Mode", modeVR:"Immersion", modeAR:"Passthrough",
    diff:"Difficulté", time:"Durée", easy:"Tranquille", normal:"Normal", hard:"Intense",
    decor:"Décor", dAuto:"Auto", dForest:"Forêt", dMeadow:"Prairie", dCarnival:"Foraine",
    enter:"Entrer en immersion", enterAR:"Entrer en réalité mixte", noVR:"Casque VR requis",
    needHeadset:"Ouvre cette page dans le navigateur du Meta Quest 3, puis appuie sur le bouton.",
    arNote:"Passthrough : le jeu utilise tes vrais murs, sol et plafond, dans ta zone Guardian.",
    how:"Au casque, choisis un jeu dans le hub, puis tape le panneau pour démarrer."
  },
  en:{
    tag:"A mini-game arcade you play standing, with your whole body.",
    mode:"Mode", modeVR:"Immersive", modeAR:"Passthrough",
    diff:"Difficulty", time:"Duration", easy:"Chill", normal:"Normal", hard:"Intense",
    decor:"Scenery", dAuto:"Auto", dForest:"Forest", dMeadow:"Meadow", dCarnival:"Fair",
    enter:"Enter immersive", enterAR:"Enter mixed reality", noVR:"VR headset required",
    needHeadset:"Open this page in the Meta Quest 3 browser, then press the button.",
    arNote:"Passthrough: the game uses your real walls, floor and ceiling, inside your Guardian area.",
    how:"In the headset, pick a game in the hub, then tap the panel to start."
  }
};
let lang = (navigator.language||'fr').slice(0,2)==='fr' ? 'fr' : 'fr';
const t = k => T[lang][k];

const engine = new Engine();
engine.registerGames([whackamole, butterflies, ducks, shooting, balloons, chamboultout, reflexpads, fishing, ringtoss, skeet, reflexchaos]);
const hub = new Hub(engine);
engine.setHub(hub);

const overlay = document.getElementById('overlay');
const btn = document.getElementById('vrbtn');
const statusEl = document.getElementById('status');
const settings = { mode:'vr', diff:'normal', dur:60, decor:'auto' };

function wireSeg(id, key, cast, cb){
  const box = document.getElementById(id);
  box.querySelectorAll('button').forEach(b=>{
    b.onclick=()=>{
      if(b.disabled) return;
      box.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      settings[key]= cast? cast(b.dataset.v) : b.dataset.v;
      if(cb) cb();
    };
  });
}
function updateEnterBtn(){
  const ok = settings.mode==='ar' ? engine.arReady : engine.vrReady;
  btn.disabled = !ok;
  btn.textContent = ok ? (settings.mode==='ar'? t('enterAR') : t('enter')) : t('noVR');
  statusEl.textContent = settings.mode==='ar' ? t('arNote') : (ok? '' : t('needHeadset'));
}
wireSeg('mode','mode',null,updateEnterBtn);
wireSeg('diff','diff');
wireSeg('dur','dur',v=>parseInt(v,10));
wireSeg('decor','decor');

function renderMenu(){
  document.documentElement.lang = lang;
  document.getElementById('tag').textContent = t('tag');
  document.getElementById('lblMode').textContent = t('mode');
  document.getElementById('lblDiff').textContent = t('diff');
  document.getElementById('lblTime').textContent = t('time');
  document.getElementById('lblDecor').textContent = t('decor');
  const dc=document.getElementById('decor').children; dc[0].textContent=t('dAuto'); dc[1].textContent=t('dForest'); dc[2].textContent=t('dMeadow'); dc[3].textContent=t('dCarnival');
  const md=document.getElementById('mode').children; md[0].textContent=t('modeVR'); md[1].textContent=t('modeAR');
  const df=document.getElementById('diff').children; df[0].textContent=t('easy'); df[1].textContent=t('normal'); df[2].textContent=t('hard');
  document.getElementById('how').textContent = t('how');
  const lp=document.getElementById('lang');
  lp.innerHTML='<a data-l="fr" class="'+(lang==='fr'?'on':'')+'">FR</a>·<a data-l="en" class="'+(lang==='en'?'on':'')+'">EN</a>';
  lp.querySelectorAll('a').forEach(a=>a.onclick=()=>{ lang=a.dataset.l; engine.lang=lang; renderMenu(); updateEnterBtn(); });
  updateEnterBtn();
}

btn.onclick = async ()=>{
  try{
    engine.lang = lang;
    engine.settings.diff = settings.diff;
    engine.settings.dur = settings.dur;
    engine.settings.decor = settings.decor;
    await engine.enter(settings.mode);
    overlay.classList.add('hidden');
    document.getElementById('lang').style.display='none';
  }catch(e){ statusEl.textContent = (lang==='fr'?'Session impossible : ':'Cannot start session: ') + e.message; }
};
engine.onExit = ()=>{
  overlay.classList.remove('hidden');
  document.getElementById('lang').style.display='';
  renderMenu();
};

engine.detect().then(()=>{
  if(!engine.arReady){
    const arBtn=document.querySelector('#mode button[data-v="ar"]');
    if(arBtn){ arBtn.disabled=true; arBtn.style.opacity=.4; }
  }
  renderMenu();
});
renderMenu();

if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }
</script>
</body>
</html>
